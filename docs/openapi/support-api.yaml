openapi: 3.1.0
info:
  title: MasterColor — API de Soporte Técnico
  version: 0.1.0
  description: >
    Contrato de la API para la app móvil (Flutter) de **soporte técnico de unidades
    vendidas**. Cubre el registro de unidades, garantías y el ciclo de vida de
    tickets de soporte para dos audiencias: **clientes** (guard JWT `client`) y
    **staff/técnicos** (guard JWT `users`).

    Todas las respuestas usan el envelope estándar del backend:
    `{ success, message, status, data, errors }`.

    Estado: implementado en el backend.
  contact:
    name: Equipo MasterColor

servers:
  - url: http://localhost:8000/api
    description: Local
  - url: https://api.mastercolor.example/api
    description: Producción (placeholder)

tags:
  - name: Cliente · Unidades
    description: Unidades vendidas y garantías del cliente autenticado.
  - name: Cliente · Tickets
    description: Tickets de soporte creados y seguidos por el cliente.
  - name: Cliente · Dispositivos
    description: Registro de tokens push (FCM) del cliente.
  - name: Cliente · Productos
    description: Catálogo de productos para el registro manual de unidades.
  - name: Cliente · Direcciones
    description: Direcciones del cliente (con coordenadas) para visitas a domicilio.
  - name: Sesión
    description: Datos del usuario autenticado (staff y cliente).
  - name: Staff · Tickets
    description: Gestión y atención de tickets por técnicos/staff.
  - name: Staff · Usuarios
    description: Listado de técnicos asignables.
  - name: Staff · Repuestos
    description: Búsqueda de repuestos y consumo por ticket (descuenta inventario).
  - name: Staff · Visitas
    description: Visitas en sitio del técnico (check-in/out con geolocalización y acta de conformidad).
  - name: Staff · Unidades
    description: Consulta de unidades vendidas por el staff.
  - name: Staff · Métricas
    description: Indicadores de soporte (SLA, carga por técnico).
  - name: Staff · Dispositivos
    description: Registro de tokens push (FCM) del staff.

security:
  - clientAuth: []

paths:
  # ──────────────────────────────────── SESIÓN ─────────────────────────────────
  /auth/me:
    get:
      tags: [Sesión]
      summary: Usuario staff autenticado
      security: [{ staffAuth: [] }]
      responses:
        '200':
          description: Datos del usuario staff en sesión.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user: { $ref: '#/components/schemas/StaffUser' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /client/auth/me:
    get:
      tags: [Sesión]
      summary: Cliente autenticado
      security: [{ clientAuth: [] }]
      responses:
        '200':
          description: Datos del cliente en sesión.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user: { $ref: '#/components/schemas/ClientUser' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ───────────────────────────── CLIENTE · UNIDADES ─────────────────────────────
  /client/units:
    get:
      tags: [Cliente · Unidades]
      summary: Listar mis unidades vendidas
      description: Unidades derivadas de las órdenes del cliente más las registradas manualmente.
      security: [{ clientAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/SoldUnitStatus' }
        - name: warranty
          in: query
          description: Filtra por estado de garantía.
          schema: { type: string, enum: [vigente, vencida] }
      responses:
        '200':
          description: Lista paginada de unidades.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/SoldUnit' }
                      pagination: { $ref: '#/components/schemas/Pagination' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Cliente · Unidades]
      summary: Registrar una unidad manualmente
      description: >
        Para unidades compradas fuera del canal online. El `serial_number` es
        opcional (productos no serializados). Puede adjuntar comprobante de compra.
      security: [{ clientAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: '#/components/schemas/SoldUnitRegisterRequest' }
      responses:
        '201':
          description: Unidad registrada.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SoldUnit' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /client/units/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Cliente · Unidades]
      summary: Detalle de una unidad
      security: [{ clientAuth: [] }]
      responses:
        '200':
          description: Detalle de la unidad (incluye garantía y tickets asociados).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SoldUnitDetail' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /client/units/{id}/warranty:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Cliente · Unidades]
      summary: Estado de garantía de una unidad
      security: [{ clientAuth: [] }]
      responses:
        '200':
          description: Información de garantía.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Warranty' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ───────────────────────────── CLIENTE · TICKETS ─────────────────────────────
  /client/support/tickets:
    get:
      tags: [Cliente · Tickets]
      summary: Listar mis tickets de soporte
      security: [{ clientAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/TicketStatus' }
      responses:
        '200':
          description: Lista paginada de tickets.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/SupportTicket' }
                      pagination: { $ref: '#/components/schemas/Pagination' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Cliente · Tickets]
      summary: Crear un ticket de soporte
      security: [{ clientAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TicketCreateRequest' }
      responses:
        '201':
          description: Ticket creado.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SupportTicket' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /client/support/tickets/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Cliente · Tickets]
      summary: Detalle de un ticket (con conversación)
      security: [{ clientAuth: [] }]
      responses:
        '200':
          description: Detalle del ticket con mensajes públicos y adjuntos.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SupportTicketDetail' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /client/support/tickets/{id}/messages:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Cliente · Tickets]
      summary: Enviar un mensaje en el ticket
      security: [{ clientAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string, example: '¿Hay novedades sobre mi caso?' }
      responses:
        '201':
          description: Mensaje agregado.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/TicketMessage' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /client/support/tickets/{id}/attachments:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Cliente · Tickets]
      summary: Adjuntar archivos al ticket
      security: [{ clientAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  items: { type: string, format: binary }
                  description: Imágenes o video (máx. recomendado 5 por petición).
                message_id:
                  type: integer
                  description: Adjuntar a un mensaje específico (opcional).
      responses:
        '201':
          description: Adjuntos cargados.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/TicketAttachment' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /client/support/tickets/{id}/rate:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Cliente · Tickets]
      summary: Calificar la atención de un ticket resuelto
      security: [{ clientAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rating]
              properties:
                rating: { type: integer, minimum: 1, maximum: 5, example: 5 }
                comment: { type: string, nullable: true }
      responses:
        '200':
          description: Calificación registrada.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SupportTicket' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /client/support/tickets/{id}/reopen:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    put:
      tags: [Cliente · Tickets]
      summary: Reabrir un ticket resuelto/cerrado
      security: [{ clientAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string, example: 'El problema volvió a presentarse.' }
      responses:
        '200':
          description: Ticket reabierto (pasa a `en_proceso`).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SupportTicket' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /client/support/tickets/{id}/quote/approve:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Cliente · Tickets]
      summary: Aprobar el presupuesto vigente
      description: El cliente aprueba la cotización; el ticket vuelve a 'en_proceso'.
      security: [{ clientAuth: [] }]
      responses:
        '200':
          description: Presupuesto aprobado.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SupportTicketDetail' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /client/support/tickets/{id}/quote/reject:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Cliente · Tickets]
      summary: Rechazar el presupuesto vigente
      security: [{ clientAuth: [] }]
      responses:
        '200':
          description: Presupuesto rechazado.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SupportTicketDetail' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  # ───────────────────────────── CLIENTE · DISPOSITIVOS ─────────────────────────
  /client/devices:
    post:
      tags: [Cliente · Dispositivos]
      summary: Registrar token push (FCM) del cliente
      security: [{ clientAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DeviceTokenRequest' }
      responses:
        '200':
          description: Token registrado/actualizado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiSuccess' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /client/devices/{token}:
    parameters:
      - name: token
        in: path
        required: true
        schema: { type: string }
    delete:
      tags: [Cliente · Dispositivos]
      summary: Eliminar token push (logout/desinstalación)
      security: [{ clientAuth: [] }]
      responses:
        '200':
          description: Token eliminado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiSuccess' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ───────────────────────────── CLIENTE · PRODUCTOS ───────────────────────────
  /client/products:
    get:
      tags: [Cliente · Productos]
      summary: Catálogo de productos (para registro manual de unidad)
      description: Búsqueda paginada de productos para seleccionar al registrar una unidad.
      security: [{ clientAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - name: search
          in: query
          description: Busca por nombre o SKU.
          schema: { type: string }
      responses:
        '200':
          description: Lista paginada de productos.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/ClientProduct' }
                      pagination: { $ref: '#/components/schemas/Pagination' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ──────────────────────────── CLIENTE · DIRECCIONES ───────────────────────────
  /client/addresses:
    get:
      tags: [Cliente · Direcciones]
      summary: Listar direcciones del cliente
      description: >-
        Direcciones del cliente autenticado, con coordenadas (latitude/longitude)
        cuando estén disponibles. Se usan para elegir a dónde va el técnico en un
        servicio a domicilio.
      security: [{ clientAuth: [] }]
      responses:
        '200':
          description: Lista de direcciones.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Address' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ────────────────────────────── STAFF · TICKETS ──────────────────────────────
  /support/tickets:
    get:
      tags: [Staff · Tickets]
      summary: Listar/filtrar tickets (cola de soporte)
      security: [{ staffAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/TicketStatus' }
        - name: priority
          in: query
          schema: { $ref: '#/components/schemas/TicketPriority' }
        - name: category
          in: query
          schema: { $ref: '#/components/schemas/TicketCategory' }
        - name: assigned_user_id
          in: query
          schema: { type: integer }
        - name: client_id
          in: query
          schema: { type: integer }
        - name: search
          in: query
          description: Busca por código, asunto o cliente.
          schema: { type: string }
      responses:
        '200':
          description: Lista paginada de tickets.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/SupportTicket' }
                      pagination: { $ref: '#/components/schemas/Pagination' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /support/tickets/mine:
    get:
      tags: [Staff · Tickets]
      summary: Tickets asignados al técnico autenticado
      security: [{ staffAuth: [] }]
      parameters:
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/TicketStatus' }
      responses:
        '200':
          description: Lista de tickets asignados.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/SupportTicket' }
                      pagination: { $ref: '#/components/schemas/Pagination' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /support/tickets/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Staff · Tickets]
      summary: Detalle completo del ticket (incluye notas internas)
      security: [{ staffAuth: [] }]
      responses:
        '200':
          description: Detalle del ticket con conversación completa e historial.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SupportTicketDetail' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /support/tickets/{id}/assign:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    patch:
      tags: [Staff · Tickets]
      summary: Asignar el ticket a un técnico
      security: [{ staffAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [assigned_user_id]
              properties:
                assigned_user_id: { type: integer, example: 7 }
      responses:
        '200':
          description: Ticket asignado (pasa a `asignado`).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SupportTicket' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /support/tickets/{id}/status:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    patch:
      tags: [Staff · Tickets]
      summary: Cambiar el estado del ticket
      description: >
        Transiciones válidas:
        `abierto→asignado`, `asignado→en_proceso`,
        `en_proceso⇄en_espera_cliente`, `en_proceso→resuelto`,
        `resuelto→cerrado`, `*→cancelado`.
      security: [{ staffAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { $ref: '#/components/schemas/TicketStatus' }
                note: { type: string, nullable: true }
      responses:
        '200':
          description: Estado actualizado.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SupportTicket' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          $ref: '#/components/responses/Conflict'

  /support/tickets/{id}/messages:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Staff · Tickets]
      summary: Responder o agregar nota interna
      security: [{ staffAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string }
                is_internal:
                  type: boolean
                  default: false
                  description: Si es `true`, la nota no es visible para el cliente.
      responses:
        '201':
          description: Mensaje/nota agregado.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/TicketMessage' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /support/tickets/{id}/attachments:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Staff · Tickets]
      summary: Adjuntar evidencia al ticket (foto de diagnóstico, etc.)
      security: [{ staffAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  items: { type: string, format: binary }
                  description: Imágenes (jpg/jpeg/png/webp, máx 5MB c/u, máx 5 por petición).
                message_id:
                  type: integer
                  description: Adjuntar a un mensaje específico (opcional).
      responses:
        '201':
          description: Adjuntos cargados.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/TicketAttachment' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /support/tickets/{id}/diagnosis:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Staff · Tickets]
      summary: Registrar diagnóstico técnico y cierre de servicio
      security: [{ staffAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DiagnosisRequest' }
      responses:
        '200':
          description: Diagnóstico registrado.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SupportTicketDetail' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /support/tickets/agenda:
    get:
      tags: [Staff · Tickets]
      summary: Agenda del técnico autenticado
      description: Tickets con visita programada en la fecha indicada (default hoy), ordenados por hora, con cliente y dirección.
      security: [{ staffAuth: [] }]
      parameters:
        - name: date
          in: query
          description: Fecha (YYYY-MM-DD). Default hoy.
          schema: { type: string, format: date }
      responses:
        '200':
          description: Tickets programados para la fecha.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/SupportTicket' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /support/tickets/sla:
    get:
      tags: [Staff · Tickets]
      summary: Tickets por SLA (vencidos o por vencer)
      description: Lista paginada de tickets abiertos cuyo SLA está vencido o próximo a vencer, ordenados por `sla_due_at` ascendente (escalamiento).
      security: [{ staffAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - name: filter
          in: query
          description: 'breached (vencidos) | due_soon (por vencer) | all (ambos, default).'
          schema: { type: string, enum: [breached, due_soon, all], default: all }
      responses:
        '200':
          description: Lista paginada de tickets por SLA.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/SupportTicket' }
                      pagination: { $ref: '#/components/schemas/Pagination' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /support/tickets/{id}/schedule:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    patch:
      tags: [Staff · Tickets]
      summary: Programar/reprogramar la visita
      security: [{ staffAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TicketScheduleRequest' }
      responses:
        '200':
          description: Visita programada.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SupportTicket' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /support/tickets/{id}/quote:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Staff · Tickets]
      summary: Crear presupuesto (servicio fuera de garantía)
      description: Crea la cotización y deja el ticket en 'en_espera_aprobacion'.
      security: [{ staffAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TicketQuoteCreateRequest' }
      responses:
        '201':
          description: Presupuesto creado.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SupportTicketDetail' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /support/tickets/{id}/parts:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Staff · Repuestos]
      summary: Registrar repuesto consumido (descuenta inventario)
      security: [{ staffAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TicketPartAddRequest' }
      responses:
        '201':
          description: Repuesto registrado.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/TicketPart' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /support/tickets/{id}/parts/{partId}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
      - name: partId
        in: path
        required: true
        schema: { type: integer }
    delete:
      tags: [Staff · Repuestos]
      summary: Quitar repuesto (revierte el descuento de stock)
      security: [{ staffAuth: [] }]
      responses:
        '200':
          description: Repuesto eliminado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiSuccess' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /support/tickets/{id}/check-in:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Staff · Visitas]
      summary: Check-in de la visita (registra llegada con geolocalización)
      description: Inicia una visita en sitio. Falla con 409 si ya hay una visita en curso (sin check-out).
      security: [{ staffAuth: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VisitCheckRequest' }
      responses:
        '201':
          description: Check-in registrado.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/TicketVisit' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /support/tickets/{id}/check-out:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Staff · Visitas]
      summary: Check-out de la visita (registra salida con geolocalización)
      description: Cierra la visita en curso y calcula el tiempo en sitio. Falla con 409 si no hay visita abierta.
      security: [{ staffAuth: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VisitCheckRequest' }
      responses:
        '200':
          description: Check-out registrado.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/TicketVisit' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /support/tickets/{id}/service-report:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    post:
      tags: [Staff · Visitas]
      summary: Reporte de servicio / acta de conformidad con firma
      description: >
        Cierra formalmente la visita: registra el trabajo realizado, los repuestos
        consumidos (descuentan inventario), las fotos y la firma de conformidad del
        cliente, y genera un acta en PDF. La firma puede enviarse como cadena base64
        (`client_signature`, JSON) o como archivo (`client_signature_file`, multipart).
        Las fotos (`photos[]`) requieren multipart/form-data.
      security: [{ staffAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ServiceReportRequest' }
          multipart/form-data:
            schema: { $ref: '#/components/schemas/ServiceReportRequest' }
      responses:
        '201':
          description: Reporte de servicio registrado (acta generada).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/TicketVisit' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /support/parts:
    get:
      tags: [Staff · Repuestos]
      summary: Buscar repuestos del inventario
      security: [{ staffAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - name: search
          in: query
          description: Busca por nombre o SKU del producto.
          schema: { type: string }
      responses:
        '200':
          description: Lista paginada de repuestos disponibles.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            stock_id: { type: integer, example: 5 }
                            product_id: { type: integer, example: 88 }
                            product_name: { type: string, nullable: true }
                            sku: { type: string, nullable: true }
                            available_qty: { type: integer, example: 12 }
                            purchase_price: { type: number, format: double, example: 180.00 }
                      pagination: { $ref: '#/components/schemas/Pagination' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ────────────────────────────── STAFF · UNIDADES ─────────────────────────────
  /support/units:
    get:
      tags: [Staff · Unidades]
      summary: Buscar unidades vendidas
      security: [{ staffAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - name: serial_number
          in: query
          schema: { type: string }
        - name: client_id
          in: query
          schema: { type: integer }
        - name: product_id
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Lista paginada de unidades.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/SoldUnit' }
                      pagination: { $ref: '#/components/schemas/Pagination' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /support/units/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Staff · Unidades]
      summary: Detalle de una unidad (con historial de tickets)
      security: [{ staffAuth: [] }]
      responses:
        '200':
          description: Detalle de la unidad.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SoldUnitDetail' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Staff · Unidades]
      summary: Actualizar una unidad (asignar nº de serie / estado)
      security: [{ staffAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                serial_number: { type: string, nullable: true, example: 'SN-MC200-000457' }
                status: { $ref: '#/components/schemas/SoldUnitStatus' }
      responses:
        '200':
          description: Unidad actualizada.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SoldUnit' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /support/units/{id}/history:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [Staff · Unidades]
      summary: Historial de servicio del equipo
      description: Línea de tiempo cronológica (más reciente primero) de aperturas de ticket, visitas y diagnósticos/resoluciones de la unidad.
      security: [{ staffAuth: [] }]
      responses:
        '200':
          description: Historial de servicio.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          unit: { $ref: '#/components/schemas/SoldUnit' }
                          tickets_count: { type: integer, example: 3 }
                          timeline:
                            type: array
                            items: { $ref: '#/components/schemas/ServiceHistoryEvent' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ────────────────────────────── STAFF · USUARIOS ─────────────────────────────
  /support/technicians:
    get:
      tags: [Staff · Usuarios]
      summary: Listar técnicos asignables
      description: Usuarios con rol `Tecnico` activos, para asignar en `PATCH /support/tickets/{id}/assign`.
      security: [{ staffAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - name: search
          in: query
          description: Busca por nombre o email.
          schema: { type: string }
        - name: specialty
          in: query
          description: Filtra técnicos que atienden esta categoría.
          schema: { type: string, enum: [garantia, instalacion, falla, consulta, otro] }
        - name: zone
          in: query
          description: Filtra técnicos que cubren este distrito/zona.
          schema: { type: string }
        - name: available_only
          in: query
          description: Si es true, solo técnicos disponibles.
          schema: { type: boolean }
      responses:
        '200':
          description: Lista paginada de técnicos.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Technician' }
                      pagination: { $ref: '#/components/schemas/Pagination' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /support/technicians/me:
    patch:
      tags: [Staff · Usuarios]
      summary: Actualizar el perfil del técnico autenticado
      description: Permite al técnico definir sus especialidades, zonas de cobertura y disponibilidad.
      security: [{ staffAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TechnicianProfileRequest' }
      responses:
        '200':
          description: Perfil actualizado.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Technician' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  # ────────────────────────────── STAFF · MÉTRICAS ─────────────────────────────
  /support/metrics:
    get:
      tags: [Staff · Métricas]
      summary: Indicadores del área de soporte
      security: [{ staffAuth: [] }]
      parameters:
        - name: date_from
          in: query
          schema: { type: string, format: date }
        - name: date_to
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: Métricas agregadas.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SupportMetrics' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ─────────────────────────── STAFF · DISPOSITIVOS ────────────────────────────
  /support/devices:
    post:
      tags: [Staff · Dispositivos]
      summary: Registrar token push (FCM) del staff
      security: [{ staffAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DeviceTokenRequest' }
      responses:
        '200':
          description: Token registrado/actualizado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiSuccess' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
  /support/devices/{token}:
    parameters:
      - name: token
        in: path
        required: true
        schema: { type: string }
    delete:
      tags: [Staff · Dispositivos]
      summary: Eliminar token push del staff (logout/desinstalación)
      security: [{ staffAuth: [] }]
      responses:
        '200':
          description: Token eliminado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiSuccess' }
        '401': { $ref: '#/components/responses/Unauthorized' }

components:
  securitySchemes:
    clientAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT del guard `client` (cliente final). Obtenido en `/client/auth/login`.
    staffAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT del guard `users` (staff/técnico). Obtenido en `/auth/login`.

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema: { type: integer, minimum: 1 }
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    PerPage:
      name: per_page
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 15 }

  responses:
    Unauthorized:
      description: No autenticado (token ausente o inválido).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
          example: { success: false, message: 'No autenticado', status: 401, data: [], errors: null }
    Forbidden:
      description: Sin permisos para esta acción.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
          example: { success: false, message: 'No autorizado', status: 403, data: [], errors: null }
    NotFound:
      description: Recurso no encontrado.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
          example: { success: false, message: 'Recurso no encontrado', status: 404, data: [], errors: null }
    Conflict:
      description: Transición de estado no permitida.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
          example: { success: false, message: "No se puede cambiar de 'cerrado' a 'asignado'", status: 409, data: [], errors: null }
    ValidationError:
      description: Error de validación.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ValidationError' }
          example:
            success: false
            message: 'Validation errors'
            data: null
            errors:
              subject: ['El campo subject es obligatorio.']

  schemas:
    # ── Envelope estándar ──
    ApiSuccess:
      type: object
      properties:
        success: { type: boolean, example: true }
        message: { type: string, example: 'OK' }
        status: { type: integer, example: 200 }
        data: {}
        errors: { nullable: true }
    ApiError:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string }
        status: { type: integer }
        data: { type: array, items: {}, example: [] }
        errors: { nullable: true }
    ValidationError:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string, example: 'Validation errors' }
        data: { nullable: true }
        errors:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
    Pagination:
      type: object
      description: Metadatos cuando la respuesta es paginada (estilo Laravel).
      properties:
        current_page: { type: integer }
        last_page: { type: integer }
        per_page: { type: integer }
        total: { type: integer }

    # ── Sesión / Usuarios ──
    StaffUser:
      type: object
      description: Usuario staff/técnico autenticado.
      properties:
        id: { type: integer, example: 7 }
        name: { type: string, example: 'Carlos Pérez' }
        email: { type: string, format: email, example: 'carlos@mastercolor.com' }
        role:
          type: object
          nullable: true
          properties:
            id: { type: integer, example: 4 }
            name: { type: string, example: 'Tecnico' }
        role_name: { type: string, nullable: true, example: 'Tecnico' }
        is_active: { type: boolean, example: true }
        phone: { type: string, nullable: true }
        dni: { type: string, nullable: true }
    ClientUser:
      type: object
      description: Cliente final autenticado.
      properties:
        id: { type: integer, example: 33 }
        name: { type: string, example: 'Ana Gómez' }
        email: { type: string, format: email, example: 'ana@example.com' }
    Technician:
      type: object
      description: Técnico asignable a un ticket, con su perfil para asignación inteligente.
      properties:
        id: { type: integer, example: 7 }
        name: { type: string, example: 'Carlos Pérez' }
        email: { type: string, format: email, example: 'carlos@mastercolor.com' }
        phone: { type: string, nullable: true, example: '900000001' }
        active: { type: boolean, example: true }
        is_available:
          type: boolean
          description: Si el técnico acepta nuevas asignaciones de visitas.
          example: true
        specialties:
          type: array
          description: Categorías de ticket que atiende.
          items: { type: string, enum: [garantia, instalacion, falla, consulta, otro] }
          example: [instalacion, falla]
        coverage_zones:
          type: array
          description: Distritos/zonas que cubre.
          items: { type: string }
          example: [Miraflores, San Isidro]
    TechnicianProfileRequest:
      type: object
      description: Campos del perfil del técnico autenticado (todos opcionales).
      properties:
        specialties:
          type: array
          items: { type: string, enum: [garantia, instalacion, falla, consulta, otro] }
        coverage_zones:
          type: array
          items: { type: string, maxLength: 100 }
        is_available: { type: boolean }
    ClientProduct:
      type: object
      description: Producto del catálogo (vista ligera para registro de unidad).
      properties:
        id: { type: integer, example: 88 }
        name: { type: string, example: 'Toner Konica Minolta C458' }
        sku: { type: string, nullable: true, example: 'TN-C458-K' }
        warranty_months: { type: integer, nullable: true, example: 12 }
        image_url:
          type: string
          nullable: true
          description: URL absoluta de la imagen del producto. null si no tiene.
          example: 'https://mastercolorfiles.s3.us-east-2.amazonaws.com/products/88.jpg'

    Address:
      type: object
      description: Dirección del cliente, con coordenadas para visitas a domicilio.
      properties:
        id: { type: integer, example: 16 }
        client_id: { type: integer, nullable: true, example: 12 }
        address_full: { type: string, example: 'Av. Prueba 123' }
        district: { type: string, example: 'Lima' }
        province: { type: string, example: 'Lima' }
        department: { type: string, example: 'Lima' }
        postal_code: { type: string, nullable: true, example: '15001' }
        reference: { type: string, nullable: true, example: 'Puerta azul' }
        is_main: { type: boolean, example: true }
        latitude: { type: number, format: double, nullable: true, example: -12.0464 }
        longitude: { type: number, format: double, nullable: true, example: -77.0428 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # ── Enums ──
    SoldUnitStatus:
      type: string
      enum: [activa, en_servicio, baja]
    TicketCategory:
      type: string
      enum: [garantia, instalacion, falla, consulta, otro]
    TicketPriority:
      type: string
      enum: [baja, media, alta, urgente]
    TicketStatus:
      type: string
      enum: [abierto, asignado, en_proceso, en_espera_cliente, en_espera_aprobacion, resuelto, cerrado, cancelado]
    TicketChannel:
      type: string
      enum: [app, web, telefono]
    DevicePlatform:
      type: string
      enum: [android, ios]
    AuthorType:
      type: string
      enum: [client, user]

    # ── Unidades / Garantía ──
    SoldUnit:
      type: object
      properties:
        id: { type: integer, example: 1024 }
        client_id: { type: integer, example: 33 }
        product_id: { type: integer, example: 88 }
        product_name: { type: string, example: 'Máquina tintométrica MC-200' }
        image_url:
          type: string
          nullable: true
          description: URL absoluta de la imagen del producto asociado. null si no tiene.
          example: 'https://mastercolorfiles.s3.us-east-2.amazonaws.com/products/88.jpg'
        order_id: { type: integer, nullable: true, example: 512 }
        serial_number:
          type: string
          nullable: true
          description: Opcional (productos no serializados).
          example: 'SN-MC200-000457'
        purchase_date: { type: string, format: date, example: '2026-01-15' }
        warranty_months: { type: integer, example: 24 }
        warranty_expires_at: { type: string, format: date, nullable: true, example: '2028-01-15' }
        warranty_active: { type: boolean, example: true }
        registration_source: { type: string, enum: [order, manual], example: order }
        status: { $ref: '#/components/schemas/SoldUnitStatus' }
        created_at: { type: string, format: date-time }
    SoldUnitDetail:
      allOf:
        - $ref: '#/components/schemas/SoldUnit'
        - type: object
          properties:
            proof_file_url: { type: string, nullable: true }
            warranty: { $ref: '#/components/schemas/Warranty' }
            tickets:
              type: array
              items: { $ref: '#/components/schemas/SupportTicket' }
    Warranty:
      type: object
      properties:
        sold_unit_id: { type: integer, example: 1024 }
        purchase_date: { type: string, format: date }
        warranty_months: { type: integer, example: 24 }
        expires_at: { type: string, format: date, nullable: true }
        active: { type: boolean, example: true }
        days_remaining: { type: integer, example: 580 }
        status: { type: string, enum: [vigente, vencida, sin_garantia], example: vigente }
    SoldUnitRegisterRequest:
      type: object
      required: [product_id, purchase_date]
      properties:
        product_id: { type: integer, example: 88 }
        serial_number: { type: string, nullable: true }
        purchase_date: { type: string, format: date, example: '2026-01-15' }
        proof_file:
          type: string
          format: binary
          description: Comprobante de compra (imagen jpg/jpeg/png/webp, máx 5MB). Opcional.

    # ── Tickets ──
    SupportTicket:
      type: object
      properties:
        id: { type: integer, example: 4501 }
        code: { type: string, example: 'SOP-2026-0001' }
        client_id: { type: integer, example: 33 }
        sold_unit_id: { type: integer, nullable: true, example: 1024 }
        product_id: { type: integer, nullable: true, example: 88 }
        category: { $ref: '#/components/schemas/TicketCategory' }
        priority: { $ref: '#/components/schemas/TicketPriority' }
        subject: { type: string, example: 'La máquina no enciende' }
        description: { type: string }
        status: { $ref: '#/components/schemas/TicketStatus' }
        channel: { $ref: '#/components/schemas/TicketChannel' }
        service_type:
          type: string
          enum: [remoto, domicilio, taller]
          description: Tipo de servicio. Si es 'domicilio', service_address está presente.
          example: domicilio
        service_address_id: { type: integer, nullable: true, example: 16 }
        scheduled_at:
          type: string
          format: date-time
          nullable: true
          description: Fecha/hora programada de la visita.
        scheduled_window_minutes:
          type: integer
          nullable: true
          description: Ventana de tolerancia en minutos.
          example: 60
        assigned_user_id: { type: integer, nullable: true, example: 7 }
        assigned_user_name: { type: string, nullable: true, example: 'Carlos Pérez' }
        is_warranty_covered: { type: boolean, nullable: true, example: true }
        sla_due_at: { type: string, format: date-time, nullable: true }
        sla_status:
          type: string
          nullable: true
          enum: [on_track, due_soon, breached]
          description: Estado del SLA del ticket; null si está resuelto/cerrado/cancelado o sin SLA.
          example: due_soon
        first_response_at: { type: string, format: date-time, nullable: true }
        resolved_at: { type: string, format: date-time, nullable: true }
        closed_at: { type: string, format: date-time, nullable: true }
        rating: { type: integer, nullable: true, minimum: 1, maximum: 5 }
        rating_comment: { type: string, nullable: true, example: 'Excelente atención' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        client:
          type: object
          nullable: true
          description: Datos del cliente (presente en cola y detalle).
          properties:
            id: { type: integer, example: 12 }
            name: { type: string, example: 'ACME S.A.C.' }
            email: { type: string, nullable: true, example: 'contacto@acme.com' }
            phone: { type: string, nullable: true, example: '910000001' }
        service_address:
          allOf: [{ $ref: '#/components/schemas/Address' }]
          nullable: true
          description: Dirección del servicio a domicilio (presente si aplica).
    SupportTicketDetail:
      allOf:
        - $ref: '#/components/schemas/SupportTicket'
        - type: object
          properties:
            sold_unit: { $ref: '#/components/schemas/SoldUnit' }
            messages:
              type: array
              items: { $ref: '#/components/schemas/TicketMessage' }
            attachments:
              type: array
              items: { $ref: '#/components/schemas/TicketAttachment' }
            status_history:
              type: array
              items: { $ref: '#/components/schemas/TicketStatusHistory' }
            diagnosis: { type: string, nullable: true }
            parts_used: { type: string, nullable: true }
            parts:
              type: array
              description: Repuestos consumidos (descuentan inventario).
              items: { $ref: '#/components/schemas/TicketPart' }
            visits:
              type: array
              description: Visitas en sitio (check-in/out y reportes de servicio).
              items: { $ref: '#/components/schemas/TicketVisit' }
            quote:
              allOf: [{ $ref: '#/components/schemas/TicketQuote' }]
              nullable: true
              description: Cotización vigente (la más reciente), si existe.
    TicketPart:
      type: object
      properties:
        id: { type: integer, example: 12 }
        stock_id: { type: integer, example: 5 }
        product_name: { type: string, nullable: true, example: 'Fusor Konica C458' }
        sku: { type: string, nullable: true, example: 'FUS-C458' }
        quantity: { type: integer, example: 1 }
        unit_cost: { type: number, format: double, nullable: true, example: 180.00 }
        created_at: { type: string, format: date-time }
    TicketQuote:
      type: object
      properties:
        id: { type: integer, example: 30 }
        ticket_id: { type: integer, example: 4501 }
        labor_cost: { type: number, format: double, example: 120.00 }
        parts_cost: { type: number, format: double, example: 50.00 }
        total: { type: number, format: double, example: 170.00 }
        currency: { type: string, example: 'PEN' }
        status: { type: string, enum: [pendiente, aprobado, rechazado], example: pendiente }
        note: { type: string, nullable: true }
        created_by_user_id: { type: integer, nullable: true, example: 7 }
        decided_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
    TicketVisit:
      type: object
      properties:
        id: { type: integer, example: 8 }
        ticket_id: { type: integer, example: 4501 }
        technician_id: { type: integer, example: 7 }
        technician_name: { type: string, nullable: true, example: 'Carlos Pérez' }
        checkin_at: { type: string, format: date-time, nullable: true }
        checkin_latitude: { type: number, format: double, nullable: true, example: -12.0464 }
        checkin_longitude: { type: number, format: double, nullable: true, example: -77.0428 }
        checkout_at: { type: string, format: date-time, nullable: true }
        checkout_latitude: { type: number, format: double, nullable: true }
        checkout_longitude: { type: number, format: double, nullable: true }
        duration_minutes:
          type: integer
          nullable: true
          description: Tiempo en sitio (null mientras la visita siga abierta).
          example: 45
        work_done: { type: string, nullable: true, example: 'Se reemplazó el fusor y se calibró.' }
        client_signed_name: { type: string, nullable: true, example: 'Juan Pérez' }
        signature_url: { type: string, format: uri, nullable: true }
        report_pdf_url:
          type: string
          format: uri
          nullable: true
          description: URL del acta de conformidad en PDF.
        reported_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
    VisitCheckRequest:
      type: object
      description: Geolocalización del check-in/check-out (todos opcionales).
      properties:
        latitude: { type: number, format: double, minimum: -90, maximum: 90, example: -12.0464 }
        longitude: { type: number, format: double, minimum: -180, maximum: 180, example: -77.0428 }
        at:
          type: string
          format: date-time
          description: Momento del registro. Si se omite, se usa la hora del servidor.
    ServiceReportRequest:
      type: object
      required: [work_done]
      properties:
        work_done: { type: string, example: 'Se reemplazó el fusor y se calibró la máquina.' }
        client_signed_name: { type: string, maxLength: 150, nullable: true, example: 'Juan Pérez' }
        client_signature:
          type: string
          nullable: true
          description: Firma como cadena base64 (data URI o base64 puro). Alternativa a client_signature_file.
        client_signature_file:
          type: string
          format: binary
          nullable: true
          description: Firma como imagen (multipart). Alternativa a client_signature.
        parts:
          type: array
          description: Repuestos consumidos durante la visita (descuentan inventario).
          items:
            type: object
            required: [stock_id, qty]
            properties:
              stock_id: { type: integer, example: 5 }
              qty: { type: integer, minimum: 1, example: 1 }
        photos:
          type: array
          maxItems: 10
          description: Fotos del servicio (multipart).
          items: { type: string, format: binary }
        resolve:
          type: boolean
          nullable: true
          description: Si es true, marca el ticket como 'resuelto' al cerrar el acta.
    ServiceHistoryEvent:
      type: object
      description: Evento de la línea de tiempo del historial de servicio de una unidad.
      properties:
        type:
          type: string
          enum: [ticket_opened, visit, resolved]
        at: { type: string, format: date-time }
        ticket_id: { type: integer, example: 4501 }
        ticket_code: { type: string, example: 'SOP-2026-0001' }
        category: { type: string, nullable: true, description: 'Solo en ticket_opened.' }
        subject: { type: string, nullable: true, description: 'Solo en ticket_opened.' }
        technician: { type: string, nullable: true, description: 'Técnico (visit / resolved).' }
        checkin_at: { type: string, format: date-time, nullable: true, description: 'Solo en visit.' }
        checkout_at: { type: string, format: date-time, nullable: true, description: 'Solo en visit.' }
        duration_minutes: { type: integer, nullable: true, description: 'Solo en visit.' }
        work_done: { type: string, nullable: true, description: 'Solo en visit.' }
        reported_at: { type: string, format: date-time, nullable: true, description: 'Solo en visit.' }
        diagnosis: { type: string, nullable: true, description: 'Solo en resolved.' }
    TicketScheduleRequest:
      type: object
      required: [scheduled_at]
      properties:
        scheduled_at: { type: string, format: date-time, example: '2026-06-10T15:00:00Z' }
        scheduled_window_minutes: { type: integer, nullable: true, example: 60 }
        note: { type: string, nullable: true }
    TicketPartAddRequest:
      type: object
      required: [stock_id, quantity]
      properties:
        stock_id: { type: integer, example: 5 }
        quantity: { type: integer, minimum: 1, example: 1 }
        unit_cost:
          type: number
          format: double
          nullable: true
          description: Si se omite, se toma el precio de compra del stock.
    TicketQuoteCreateRequest:
      type: object
      required: [labor_cost]
      properties:
        labor_cost: { type: number, format: double, example: 120.00 }
        parts_cost:
          type: number
          format: double
          nullable: true
          description: Si se omite, se calcula de los repuestos registrados.
        currency: { type: string, default: 'PEN', example: 'PEN' }
        note: { type: string, nullable: true }
    TicketCreateRequest:
      type: object
      required: [category, subject, description]
      properties:
        sold_unit_id:
          type: integer
          nullable: true
          description: Unidad asociada (opcional para consultas generales).
        category: { $ref: '#/components/schemas/TicketCategory' }
        priority:
          $ref: '#/components/schemas/TicketPriority'
        subject: { type: string, maxLength: 150, example: 'La máquina no enciende' }
        description: { type: string, example: 'Al conectar no muestra señal de encendido.' }
        service_type:
          type: string
          enum: [remoto, domicilio, taller]
          default: remoto
          description: Tipo de servicio. Si es 'domicilio', service_address_id es obligatorio.
        service_address_id:
          type: integer
          nullable: true
          description: Dirección del cliente a la que va el técnico (requerido si service_type=domicilio).
          example: 16
    TicketMessage:
      type: object
      properties:
        id: { type: integer }
        ticket_id: { type: integer }
        author_type: { $ref: '#/components/schemas/AuthorType' }
        author_id: { type: integer }
        author_name: { type: string, example: 'Carlos Pérez' }
        body: { type: string }
        is_internal: { type: boolean, example: false }
        read_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        attachments:
          type: array
          items: { $ref: '#/components/schemas/TicketAttachment' }
    TicketAttachment:
      type: object
      properties:
        id: { type: integer }
        ticket_id: { type: integer }
        message_id: { type: integer, nullable: true }
        url: { type: string, example: 'https://.../storage/tickets/abc.jpg' }
        file_type: { type: string, example: 'image/jpeg' }
        original_name: { type: string, example: 'foto-falla.jpg' }
        created_at: { type: string, format: date-time }
    TicketStatusHistory:
      type: object
      properties:
        id: { type: integer }
        from_status: { type: string, nullable: true }
        to_status: { $ref: '#/components/schemas/TicketStatus' }
        changed_by_type: { $ref: '#/components/schemas/AuthorType' }
        changed_by_name: { type: string }
        note: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
    DiagnosisRequest:
      type: object
      required: [diagnosis]
      properties:
        diagnosis: { type: string, example: 'Fuente de poder dañada; se reemplaza.' }
        parts_used: { type: string, nullable: true, example: 'Fuente 24V x1' }
        resolve:
          type: boolean
          default: false
          description: Si es `true`, marca el ticket como `resuelto`.

    # ── Métricas ──
    SupportMetrics:
      type: object
      properties:
        total_tickets: { type: integer, example: 320 }
        open_tickets: { type: integer, example: 42 }
        unassigned_tickets: { type: integer, example: 8 }
        resolved_this_month: { type: integer, example: 96 }
        avg_first_response_hours: { type: number, format: float, example: 3.5 }
        avg_resolution_hours: { type: number, format: float, example: 28.2 }
        sla_breached: { type: integer, example: 5 }
        by_status:
          type: object
          additionalProperties: { type: integer }
        by_technician:
          type: array
          items:
            type: object
            properties:
              user_id: { type: integer }
              name: { type: string }
              assigned: { type: integer }
              resolved: { type: integer }

    # ── Dispositivos ──
    DeviceTokenRequest:
      type: object
      required: [token, platform]
      properties:
        token: { type: string, description: 'Token FCM del dispositivo.' }
        platform: { $ref: '#/components/schemas/DevicePlatform' }
